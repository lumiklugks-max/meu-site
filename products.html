<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto - Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-box { max-width: 500px; margin: 50px auto; padding: 30px; background: #1a1a2e; border-radius: 15px; color: white; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #16213e; color: white; }
        textarea { height: 100px; resize: vertical; }
        button { width: 100%; padding: 15px; background: #00d2ff; color: #1a1a2e; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>Novo Produto</h2>
    <form id="productForm">
        <input type="text" id="pNome" placeholder="Nome do Produto" required>
        <input type="number" id="pPreco" placeholder="Preço (Ex: 99.90)" step="0.01" required>
        <input type="number" id="pEstoque" placeholder="Quantidade em Estoque" required>
        <textarea id="pDescricao" placeholder="Descrição detalhada do produto..."></textarea>
        <input type="text" id="pImagem" placeholder="Link da Imagem (URL)" required>
        <button type="submit">Cadastrar Produto</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCZq4K95loqNKYYuPFFrMS9QcUTCQ-FYRU",
        authDomain: "cadastroteste047.firebaseapp.com",
        databaseURL: "https://cadastroteste047-default-rtdb.firebaseio.com",
        projectId: "cadastroteste047",
        storageBucket: "cadastroteste047.firebasestorage.app",
        appId: "1:908890693829:web:2bd31d24474e27507310ac"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById('productForm').addEventListener('submit', (e) => {
        e.preventDefault();

        const novoProduto = {
            nome: document.getElementById('pNome').value,
            preco: parseFloat(document.getElementById('pPreco').value),
            estoque: parseInt(document.getElementById('pEstoque').value),
            descricao: document.getElementById('pDescricao').value, // SALVANDO A DESCRIÇÃO
            imagem: document.getElementById('pImagem').value
        };

        push(ref(db, 'produtos'), novoProduto).then(() => {
            alert("Produto cadastrado com sucesso!");
            document.getElementById('productForm').reset();
        });
    });
</script>
</body>
</html>
