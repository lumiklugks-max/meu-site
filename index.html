<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form id="cadastroForm">
            <h2>Bem-vindo!</h2>
            <p>Cadastre-se para acessar nossa vitrine</p>
            
            <input type="text" id="nome" placeholder="Seu Nome Completo" required>
            <input type="text" id="whatsapp" placeholder="Seu WhatsApp" required>
            
            <button type="submit">Acessar Vitrine</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZq4K95loqNKYYuPFFrMS9QcUTCQ-FYRU",
            authDomain: "cadastroteste047.firebaseapp.com",
            databaseURL: "https://cadastroteste047-default-rtdb.firebaseio.com",
            projectId: "cadastroteste047",
            storageBucket: "cadastroteste047.firebasestorage.app",
            appId: "1:908890693829:web:2bd31d24474e27507310ac"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('cadastroForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const whatsapp = document.getElementById('whatsapp').value;

            // Salva no Firebase
            push(ref(db, 'clientes'), {
                nome: nome,
                whatsapp: whatsapp,
                data: new Date().toISOString()
            }).then(() => {
                alert("Cadastro realizado! Aproveite nossas ofertas.");
                // A MÁGICA ACONTECE AQUI:
                window.location.href = 'showcase.html';
            }).catch((error) => {
                alert("Erro ao cadastrar: " + error.message);
            });
        });
    </script>
</body>
</html>
